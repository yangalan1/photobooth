<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'DM Mono', monospace;
}

/* ════════════════════════════════════════
   SHARED
════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
  z-index: 1;
}
.screen.active {
  opacity: 1; pointer-events: all;
}

/* Pill label style used on both screens */
.pill-label {
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 100px;
  padding: 10px 22px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  white-space: nowrap;
}

/* ════════════════════════════════════════
   SCREEN 1: BOOTH
════════════════════════════════════════ */
#booth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* Polaroids scattered around - these are absolutely placed */
#booth-screen .scattered-photos {
  position: absolute; inset: 0;
  pointer-events: none;
}

/* Viewfinder: landscape, big */
#viewfinder-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#viewfinder {
  position: relative;
  width: 62vw;
  height: calc(62vw * 9 / 16);
  max-height: 70vh;
  max-width: calc(70vh * 16 / 9);
  background: #111;
  border-radius: 8px;
  overflow: visible; /* allow polaroids to overlap edges */
  box-shadow:
    0 0 0 2px #222,
    0 0 0 4px #333,
    0 28px 80px rgba(0,0,0,0.5);
}

/* Inner clip for video */
#vf-inner {
  position: absolute; inset: 0;
  border-radius: 8px;
  overflow: hidden;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
}

#face-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  transform: scaleX(-1);
}

#flash {
  position: absolute; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 20;
  transition: opacity 0.04s;
  border-radius: 8px;
}
#flash.on { opacity: 1; }

/* Corner brackets */
.vc {
  position: absolute;
  width: 22px; height: 22px;
  border-color: rgba(255,255,255,0.25);
  border-style: solid;
  pointer-events: none; z-index: 5;
}
.vc.tl { top:12px;    left:12px;   border-width:2px 0 0 2px; }
.vc.tr { top:12px;    right:12px;  border-width:2px 2px 0 0; }
.vc.bl { bottom:12px; left:12px;   border-width:0 0 2px 2px; }
.vc.br { bottom:12px; right:12px;  border-width:0 2px 2px 0; }

/* Countdown */
#countdown-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 15; pointer-events: none;
  background: rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.2s;
  border-radius: 8px;
}
#countdown-overlay.visible { opacity: 1; }

#countdown-num {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 22vw;
  color: #fff;
  line-height: 1;
  text-shadow: 0 8px 50px rgba(0,0,0,0.3);
}
#countdown-num.pop { animation: numPop 0.95s ease-out forwards; }
@keyframes numPop {
  0%   { transform: scale(1.5); opacity: 0; }
  20%  { transform: scale(1);   opacity: 1; }
  78%  { transform: scale(1);   opacity: 1; }
  100% { transform: scale(0.85); opacity: 0; }
}

/* Status pill above viewfinder */
#status-pill {
  position: absolute;
  top: -52px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

/* Booth screen polaroids — scattered around the frame */
.booth-photo {
  position: absolute;
  background: #fdfaf4;
  padding: 8px 8px 26px;
  border-radius: 2px;
  box-shadow: 2px 4px 16px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.08);
  pointer-events: none;
  z-index: 20;
  transition: all 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.booth-photo img {
  display: block;
  object-fit: cover;
}

/* ════════════════════════════════════════
   SCREEN 2: PHOTO WALL
════════════════════════════════════════ */
#wall-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: transparent;
}

#wall-title {
  position: absolute;
  top: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#wall-url {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

/* Three conveyor rows */
#conveyor-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0px;
  padding: 60px 0;
}

.conveyor-row {
  width: 100%;
  overflow: hidden;
  padding: 40px 0;
  position: relative;
  display: flex;
}

.conveyor-track {
  display: flex;
  gap: 24px;
  width: max-content;
  /* animation applied via JS per row */
}

@keyframes scrollLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Wall polaroids */
.wall-photo {
  flex-shrink: 0;
  background: #fdfaf4;
  padding: 8px 8px 28px;
  border-radius: 2px;
  box-shadow: 2px 4px 20px rgba(0,0,0,0.14), 0 1px 5px rgba(0,0,0,0.08);
}
.wall-photo img {
  display: block;
  width: 180px; height: 180px;
  object-fit: cover;
}

/* ── Sign-in overlay ── */
#signin-overlay {
  position: fixed; inset: 0;
  background: #141414;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 9998;
  text-align: center; padding: 30px;
}
#signin-overlay.done { display: none; }
#signin-title {
  font-size: 1.1rem; color: #ddd;
  letter-spacing: 0.2em; text-transform: uppercase;
}
#signin-sub {
  font-size: 0.65rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #555;
  line-height: 2; max-width: 280px;
}
#signin-btn {
  font-family: "DM Mono", monospace;
  font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase;
  background: #fff; color: #222;
  border: none; border-radius: 100px;
  padding: 12px 28px; cursor: pointer;
  transition: background 0.2s;
}
#signin-btn:hover { background: #e8e8e8; }

/* ── Boot overlay ── */
#boot-overlay {
  position: fixed; inset: 0;
  background: #141414;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 9999;
  text-align: center; padding: 30px;
}
#boot-overlay.done { display: none; }
#boot-title {
  font-size: 1.1rem; color: #ddd;
  letter-spacing: 0.2em; text-transform: uppercase;
}
#boot-msg {
  font-size: 0.65rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: #555;
  line-height: 2; max-width: 320px;
}
.spinner {
  width: 26px; height: 26px;
  border: 1.5px solid #2a2a2a;
  border-top-color: #e8a020;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── QR panel ── */
#qr-panel {
  position: fixed;
  bottom: 20px; left: 20px;
  z-index: 300;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 14px 16px 12px;
  backdrop-filter: blur(10px);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
}
#qr-panel.visible { display: flex; }
#qr-code { width: 130px; height: 130px; }
#qr-code canvas, #qr-code img { width: 130px !important; height: 130px !important; }
#qr-label {
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.35);
  text-align: center;
  line-height: 1.8;
}



/* Keyboard hint below viewfinder */
#kbd-hint {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
  z-index: 10;
  position: relative;
}
.kbd-group {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.3);
}
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px; height: 20px;
  padding: 0 6px;
  border: 1px solid rgba(0,0,0,0.22);
  border-bottom-width: 2.5px;
  border-radius: 4px;
  font-size: 0.6rem;
  font-weight: 500;
  color: rgba(0,0,0,0.4);
  background: rgba(255,255,255,0.7);
  letter-spacing: 0;
  line-height: 1;
}
.kbd-sep {
  color: rgba(0,0,0,0.15);
  font-size: 0.5rem;
}

/* ════════════════════════════════════════
   SETTINGS PANEL
════════════════════════════════════════ */
#settings-panel {
  position: fixed;
  top: 0; right: -380px;
  width: 360px; height: 100%;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(0,0,0,0.08);
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: right 0.35s cubic-bezier(0.34,1.2,0.64,1);
  overflow-y: auto;
  overflow-x: hidden;
}
#settings-panel.open { right: 0; }

#settings-header {
  padding: 22px 24px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#settings-header h2 {
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.6);
  font-weight: 500;
}
#settings-close {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; color: rgba(0,0,0,0.4);
  transition: background 0.15s;
}
#settings-close:hover { background: rgba(0,0,0,0.12); }

.settings-section {
  padding: 18px 24px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.settings-section-title {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.35);
  margin-bottom: 12px;
}

/* Color picker row */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.color-row label {
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  color: rgba(0,0,0,0.5);
  flex: 1;
}
.color-swatch-wrap {
  position: relative;
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(0,0,0,0.1);
  cursor: pointer;
  flex-shrink: 0;
}
.color-swatch-wrap input[type=color] {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none; padding: 0;
  cursor: pointer;
  opacity: 0;
}
.color-preview {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Pattern grid */
.pattern-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.pattern-thumb {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
}
.pattern-thumb:hover { transform: scale(1.05); }
.pattern-thumb.selected { border-color: rgba(0,0,0,0.5); }
.pattern-thumb canvas {
  width: 100%; height: 100%;
  display: block;
}
.pattern-thumb .p-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 0.42rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  padding: 3px 2px;
}

/* Frame color swatches */
.frame-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.frame-swatch {
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}
.frame-swatch:hover { transform: scale(1.1); }
.frame-swatch.selected { border-color: rgba(0,0,0,0.5); }

/* S key hint */
#settings-hint {
  position: fixed;
  top: 16px; left: 18px;
  z-index: 400;
}
#settings-hint .kbd { cursor: pointer; }

/* Background canvas (renders pattern) */
#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Animated pattern overlays */
@keyframes confettiFall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(110vh) rotate(720deg); opacity: 0.6; }
}
@keyframes starTwinkle {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.3); }
}
@keyframes dotPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.08); }
}
</style>
</head>
<body>

<!-- ══ BOOTH SCREEN ══ -->
<div id="booth-screen" class="screen active">

  <!-- Polaroids scattered around camera (injected by JS) -->
  <div id="scattered-photos" class="scattered-photos"></div>

  <div id="viewfinder-wrap">
    <!-- Status pill floats above -->
    <div id="status-pill" class="pill-label">Starting…</div>

    <div id="viewfinder">
      <div id="vf-inner">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="face-canvas"></canvas>
      </div>
      <div id="flash"></div>
      <div class="vc tl"></div><div class="vc tr"></div>
      <div class="vc bl"></div><div class="vc br"></div>
      <div id="countdown-overlay"><div id="countdown-num">3</div></div>
    </div>

    <div id="kbd-hint" class="pill-label">
      <div class="kbd-group">
        <span class="kbd">W</span>
        <span>photo wall</span>
      </div>
      <span class="kbd-sep">|</span>
      <div class="kbd-group">
        <span class="kbd">B</span>
        <span>/</span>
        <span class="kbd">ESC</span>
        <span>booth</span>
      </div>
    </div>

  </div>
</div>

<!-- ══ WALL SCREEN ══ -->
<div id="wall-screen" class="screen">
  <div id="wall-title" class="pill-label">the photo wall</div>

  <div id="conveyor-wrap">
    <div class="conveyor-row" id="row-0"><div class="conveyor-track" id="track-0"></div></div>
    <div class="conveyor-row" id="row-1"><div class="conveyor-track" id="track-1"></div></div>
    <div class="conveyor-row" id="row-2"><div class="conveyor-track" id="track-2"></div></div>
  </div>

  <div id="wall-url" class="pill-label" id="wall-bottom-pill">0 shots taken</div>
</div>

<!-- HUD -->
<!-- QR code panel — shows album link after first upload -->
<div id="qr-panel">
  <div id="qr-code"></div>
  <div id="qr-label">Scan to view<br>your photos</div>
</div>




<!-- Boot -->
<!-- Background canvas for patterns -->
<canvas id="bg-canvas"></canvas>

<!-- Settings panel -->
<div id="settings-panel">
  <div id="settings-header">
    <h2>Customize</h2>
    <button id="settings-close" onclick="toggleSettings()">✕</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Wall background color</div>
    <div class="color-row" style="gap:8px;">
      <div class="color-swatch-wrap" id="bg-swatch-wrap" style="flex-shrink:0;">
        <div class="color-preview" id="bg-color-preview"></div>
        <input type="color" id="bg-color-input" value="#e8e4db" oninput="onBgColor(this.value)">
      </div>
      <input type="text" id="bg-hex-input" maxlength="7" placeholder="#e8e4db"
        style="flex:1;font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;
               border:1px solid rgba(0,0,0,0.12);border-radius:8px;padding:8px 12px;
               background:rgba(0,0,0,0.03);color:rgba(0,0,0,0.6);outline:none;"
        oninput="onBgHex(this.value)">
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Wall pattern</div>
    <div class="pattern-grid" id="pattern-grid"></div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Animations</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.68rem;letter-spacing:0.06em;color:rgba(0,0,0,0.5);">Pattern animations</span>
      <button id="anim-toggle" onclick="toggleAnim()"
        style="font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;
               text-transform:uppercase;border:1px solid rgba(0,0,0,0.15);border-radius:100px;
               padding:5px 14px;cursor:pointer;transition:all 0.2s;background:rgba(0,0,0,0.06);
               color:rgba(0,0,0,0.45);">On</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Polaroid frame color</div>
    <div class="frame-swatches" id="frame-swatches"></div>
  </div>
</div>

<!-- S key hint -->
<div id="settings-hint">
  <div class="kbd-group pill-label" style="gap:6px;padding:7px 14px;">
    <span class="kbd" onclick="toggleSettings()" style="cursor:pointer;">S</span>
    <span style="font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.3);">settings</span>
  </div>
</div>

<!-- Google Sign-in overlay -->
<div id="signin-overlay">
  <div id="signin-title">Photo Booth</div>
  <div id="signin-sub">Sign in with Google to save<br>your photos automatically</div>
  <button id="signin-btn" onclick="initGoogleAuth()">Sign in with Google</button>
</div>

<div id="boot-overlay">
  <div class="spinner"></div>
  <div id="boot-title">Photo Booth</div>
  <div id="boot-msg">Loading…</div>
</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
import { FaceDetector, HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs';

// ══ CONFIG ═══════════════════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '886639956777-nrr3flmoico29qvprt67h140ufvq0nnm.apps.googleusercontent.com';
const BITLY_LINK       = 'bit.ly/downloadmyphoto';
const ALBUM_NAME       = 'Photo Booth';
const MAX_PHOTOS       = 60;
// ════════════════════════════════════════════════════════════════════

const WASM_PATH  = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm';
const FACE_MODEL = 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite';
const HAND_MODEL = 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';

// ── DOM ───────────────────────────────────────────────────────────────
const video          = document.getElementById('video');
const faceCanvas     = document.getElementById('face-canvas');
const captureCanvas  = document.getElementById('capture-canvas');
const fctx           = faceCanvas.getContext('2d');
const flash          = document.getElementById('flash');
const statusPill     = document.getElementById('status-pill');
const countdownOvl   = document.getElementById('countdown-overlay');
const countdownNum   = document.getElementById('countdown-num');
const bootOverlay    = document.getElementById('boot-overlay');
const bootMsg        = document.getElementById('boot-msg');
const shotCounter    = document.getElementById('shot-counter');
const scatteredWrap  = document.getElementById('scattered-photos');
const wallUrl        = document.getElementById('wall-url');

wallUrl.innerHTML = `0 shots taken`;

// ── State ─────────────────────────────────────────────────────────────
let faceDetector, handLandmarker;
let lastVideoTime = -1;
let lastFaces     = [];
let busy          = false;
let photoCount    = 0;
let allDataURLs   = [];
let currentScreen = 'booth'; // 'booth' | 'wall'

// Photo data store for wall
let photos = []; // { dataURL, rot }

// Conveyor tracks
const tracks    = [0,1,2].map(i => document.getElementById(`track-${i}`));
const rowPhotos = [[],[],[]]; // photos per row

// Row rotations: slight tilt per row, alternating direction
const ROW_ROTS = [
  [-8, -3, 2, -5, 4, -2, 6, -4, 1, -6],
  [4, -6, 2, 7, -3, 5, -1, 6, -5, 3],
  [-3, 5, -7, 2, -4, 7, -2, 4, -6, 3],
];

// ── Boot ──────────────────────────────────────────────────────────────
async function init() {
  try {
    bootMsg.textContent = 'Requesting camera…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();

    faceCanvas.width     = video.videoWidth;
    faceCanvas.height    = video.videoHeight;
    captureCanvas.width  = video.videoWidth;
    captureCanvas.height = video.videoHeight;

    bootMsg.innerHTML = 'Loading AI models…<br>First load ~15 sec';

    const vision = await FilesetResolver.forVisionTasks(WASM_PATH);
    [faceDetector, handLandmarker] = await Promise.all([
      FaceDetector.createFromOptions(vision, {
        baseOptions: { modelAssetPath: FACE_MODEL, delegate: 'GPU' },
        runningMode: 'VIDEO', minDetectionConfidence: 0.4
      }),
      HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: HAND_MODEL, delegate: 'GPU' },
        runningMode: 'VIDEO', numHands: 2,
        minHandDetectionConfidence: 0.55,
        minHandPresenceConfidence: 0.55,
        minTrackingConfidence: 0.5
      })
    ]);

    bootOverlay.classList.add('done');
    requestAnimationFrame(loop);
  } catch(e) {
    bootOverlay.querySelector('.spinner').style.display = 'none';
    bootMsg.innerHTML = e.name === 'NotAllowedError'
      ? 'Camera permission denied.<br>Allow access & refresh.'
      : 'Error: ' + e.message;
    console.error(e);
  }
}

// ── Detection loop ────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (!faceDetector || video.readyState < 2) return;
  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const fr = faceDetector.detectForVideo(video, ts);
  const hr = handLandmarker.detectForVideo(video, ts);
  lastFaces = fr.detections ?? [];

  if (currentScreen === 'booth') {
    drawFaceBoxes(lastFaces);
    if (!busy) processState(lastFaces, hr.landmarks ?? []);
  }
}

// ── State machine ─────────────────────────────────────────────────────
function processState(faces, hands) {
  if (!faces.length) { setStatus('Step into frame'); return; }
  if (hands.some(isPeaceSign)) { setStatus('get ready for the photo…'); startCountdown(); return; }
  setStatus('hold up a ✌️ sign to snap a photo');
}

function setStatus(t) { statusPill.textContent = t; }

// ── Countdown ─────────────────────────────────────────────────────────
function startCountdown() {
  busy = true;
  countdownOvl.classList.add('visible');
  let n = 3; showNum(n);
  const t = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(t);
      showNum('✦');
      setTimeout(() => { countdownOvl.classList.remove('visible'); doSnap(); }, 650);
    } else { showNum(n); }
  }, 1000);
}

function showNum(v) {
  countdownNum.textContent = v;
  countdownNum.classList.remove('pop');
  void countdownNum.offsetWidth;
  countdownNum.classList.add('pop');
}

// ── Snap ──────────────────────────────────────────────────────────────
function doSnap() {
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 110);

  const cctx = captureCanvas.getContext('2d');
  cctx.save();
  cctx.translate(captureCanvas.width, 0);
  cctx.scale(-1, 1);
  cctx.drawImage(video, 0, 0);
  cctx.restore();

  // Square center crop
  const vw = captureCanvas.width, vh = captureCanvas.height;
  const size = Math.min(vw, vh);
  const c = document.createElement('canvas');
  c.width = 800; c.height = 800;
  c.getContext('2d').drawImage(captureCanvas, (vw-size)/2, (vh-size)/2, size, size, 0, 0, 800, 800);
  const dataURL = c.toDataURL('image/jpeg', 0.93);

  addPhoto(dataURL);
  uploadPhoto(dataURL);

  setTimeout(() => {
    busy = false;
    setStatus('hold up a ✌️ sign to snap a photo');
  }, 2000);
}

// ── Add photo to both views ───────────────────────────────────────────
function addPhoto(dataURL) {
  photoCount++;
  allDataURLs.unshift(dataURL);

  const rot = (Math.random() - 0.5) * 16;
  photos.unshift({ dataURL, rot });
  if (photos.length > MAX_PHOTOS) photos.pop();

  // Update scattered photos on booth screen
  updateScattered();

  // Add to conveyor wall
  addToConveyor(dataURL, rot);

  // Update wall pill
  const mins = 0;
  wallUrl.innerHTML = `${photoCount} shot${photoCount !== 1 ? 's' : ''} taken`;

  updateHUD();
}

// ── Booth scattered photos ────────────────────────────────────────────
// Positions around the viewfinder edges — truly random, not stacked
// Each photo gets a stable random position seeded by its index so it
// doesn't jump around every time a new photo is added.
function seededRand(seed) {
  // Simple deterministic random from seed
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

// Track placed booth photo positions so we avoid overlap when possible
let boothPhotoRects = [];

function updateScattered() {
  scatteredWrap.innerHTML = '';
  boothPhotoRects = [];
  const vf = document.getElementById('viewfinder').getBoundingClientRect();
  const recent = photos.slice(0, 16);

  const SZ  = 140; // polaroid image size px
  const PW  = SZ + 18; // total polaroid width
  const PH  = SZ + 36; // total polaroid height
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const M   = 6; // hard margin — polaroid must be at least this far outside vf

  // Four strict strips around the viewfinder.
  // A polaroid placed in a strip can NEVER overlap the vf rect.
  //
  //   LEFT strip:   right edge of polaroid  <= vf.left - M
  //   RIGHT strip:  left edge of polaroid   >= vf.right + M
  //   TOP strip:    bottom edge of polaroid <= vf.top - M   (only between left/right strips)
  //   BOTTOM strip: top edge of polaroid    >= vf.bottom + M
  //
  // For LEFT/RIGHT: x is fully constrained so the polaroid sits just outside.
  // y is random across the full screen height (polaroids can be above/below vf vertically).
  // For TOP/BOTTOM: y is constrained. x is random but must also stay outside left/right bounds.

  // Left strip — polaroid right edge touches vf.left
  const leftX  = { min: Math.max(4,       vf.left - PW - 40), max: vf.left - M - PW };
  // Right strip — polaroid left edge touches vf.right
  const rightX = { min: vf.right + M,     max: Math.min(W - PW - 4, vf.right + 60) };
  // Full vertical range (allow polaroids to sit level with or beyond vf vertically)
  const fullY  = { min: Math.max(4, vf.top - PH * 0.4), max: Math.min(H - PH - 4, vf.bottom + PH * 0.4) };

  // Top strip — only outside the left/right strips horizontally
  const topY   = { min: Math.max(4, vf.top - PH - 20), max: vf.top - M - PH };
  const botY   = { min: vf.bottom + M,                  max: Math.min(H - PH - 4, vf.bottom + PH + 20) };
  // x for top/bottom: anywhere across screen
  const horzX  = { min: Math.max(4, vf.left - PW * 0.5), max: Math.min(W - PW - 4, vf.right - PW * 0.5) };

  const zones = [
    { x: leftX,  y: fullY },  // 0 left
    { x: rightX, y: fullY },  // 1 right
    { x: leftX,  y: { min: fullY.min, max: fullY.min + (fullY.max - fullY.min) * 0.5 } }, // 2 left-upper
    { x: rightX, y: { min: fullY.min + (fullY.max - fullY.min) * 0.5, max: fullY.max } }, // 3 right-lower
    { x: leftX,  y: { min: fullY.min + (fullY.max - fullY.min) * 0.5, max: fullY.max } }, // 4 left-lower
    { x: rightX, y: { min: fullY.min, max: fullY.min + (fullY.max - fullY.min) * 0.5 } }, // 5 right-upper
    { x: horzX,  y: topY  },  // 6 top
    { x: horzX,  y: botY  },  // 7 bottom
  ];

  // Render oldest first (end of array), newest last (index 0) so newest is on top
  const toRender = [...recent].reverse();

  toRender.forEach((p, i) => {
    const zIdx = i; // older = lower z, newer = higher z (rendered last = on top)
    const actualIdx = recent.length - 1 - i; // map back to original seeded index
    const zone = zones[actualIdx % zones.length];
    const r1   = seededRand(actualIdx * 7 + 1);
    const r2   = seededRand(actualIdx * 7 + 2);

    const xRange = Math.max(1, zone.x.max - zone.x.min);
    const yRange = Math.max(1, zone.y.max - zone.y.min);
    let x = zone.x.min + r1 * xRange;
    let y = zone.y.min + r2 * yRange;

    // Avoid QR panel area: bottom-left corner
    const qrRight = 20 + 162;
    const qrTop   = H - 20 - 192;
    if (x < qrRight && y > qrTop) {
      x = qrRight + 10 + seededRand(actualIdx * 3 + 99) * 60;
    }

    // Try non-overlapping position — try up to 8 offsets within same zone
    const myRect = { x, y, w: PW, h: PH };
    let placed = false;
    for (let attempt = 0; attempt < 8 && !placed; attempt++) {
      const rx = zone.x.min + seededRand(actualIdx * 7 + attempt * 13 + 1) * xRange;
      const ry = zone.y.min + seededRand(actualIdx * 7 + attempt * 13 + 2) * yRange;
      const overlaps = boothPhotoRects.some(r =>
        rx < r.x + r.w && rx + PW > r.x && ry < r.y + r.h && ry + PH > r.y
      );
      if (!overlaps || attempt === 7) {
        myRect.x = rx; myRect.y = ry;
        x = rx; y = ry;
        placed = true;
      }
    }
    boothPhotoRects.push(myRect);

    const el = document.createElement('div');
    el.className = 'booth-photo';
    el.style.cssText = `
      left: ${x}px;
      top:  ${y}px;
      transform: rotate(${p.rot}deg);
      animation: boothPhotoIn 0.45s cubic-bezier(0.34,1.5,0.64,1) both;
      animation-delay: ${actualIdx * 0.04}s;
      background: ${cfg.frameColor};
      z-index: ${20 + zIdx};
    `;

    const img = document.createElement('img');
    img.src = p.dataURL;
    img.style.cssText = `width:${SZ}px;height:${SZ}px;object-fit:cover;display:block;`;

    el.appendChild(img);
    scatteredWrap.appendChild(el);
  });
}

// ── Conveyor wall ─────────────────────────────────────────────────────
function addToConveyor(dataURL, rot) {
  const rowIdx = (photoCount - 1) % 3; // distribute across 3 rows
  rowPhotos[rowIdx].push({ dataURL, rot });
  rebuildConveyor(rowIdx);
}

function rebuildConveyor(rowIdx) {
  const track  = tracks[rowIdx];
  const photos = rowPhotos[rowIdx];
  const screenW = window.innerWidth;

  // Clear and rebuild from source of truth (rowPhotos)
  track.innerHTML = '';
  track.style.animation = 'none';

  if (photos.length === 0) return;

  // Build one set of real photos first
  function makeCard(p, idx) {
    const el  = document.createElement('div');
    el.className = 'wall-photo';
    // Random vertical offset per card so they look scattered, not grid-like
    const dy = (seededRand(idx * 13 + rowIdx * 77) - 0.5) * 60;
    el.style.transform = `rotate(${p.rot}deg) translateY(${dy}px)`;
    el.style.background = cfg.frameColor;
    const img = document.createElement('img');
    img.src = p.dataURL;
    el.appendChild(img);
    return el;
  }

  photos.forEach((p, i) => track.appendChild(makeCard(p, i)));

  // Only scroll if content is wider than the screen
  // Use setTimeout to let browser calculate scrollWidth
  setTimeout(() => {
    const trackW = track.scrollWidth;
    if (trackW <= screenW) {
      // Not enough photos to scroll — just center them, no animation
      track.parentElement.style.justifyContent = 'center';
      return;
    }
    track.parentElement.style.justifyContent = '';

    // Duplicate cards to make seamless loop
    const clone = track.cloneNode(true);
    clone.querySelectorAll('img').forEach((img, i) => {
      img.src = photos[i % photos.length].dataURL;
    });
    // Actually just append individual clones
    photos.forEach((p, i) => track.appendChild(makeCard(p, i + photos.length)));

    const totalW = track.scrollWidth / 2;
    const speed  = 38; // px/s
    const dur    = totalW / speed;

    void track.offsetWidth;
    track.style.animation = `scrollLeft ${dur}s linear infinite`;
  }, 60);
}

// ── Google Photos auth + upload ───────────────────────────────────────
let gAccessToken  = null;
let gAlbumId      = null;
let gAlbumUrl     = null;
let gSignedIn     = false;

function initGoogleAuth() {
  google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/photoslibrary.appendonly https://www.googleapis.com/auth/photoslibrary.readonly.appcreateddata',
    callback: async (resp) => {
      if (resp.error) { console.error('Auth error:', resp); return; }
      gAccessToken = resp.access_token;
      gSignedIn    = true;
      document.getElementById('signin-overlay').classList.add('done');
      // Create or find the album
      await ensureAlbum();
    }
  }).requestAccessToken();
}

async function ensureAlbum() {
  try {
    // Create a new album for this session
    const res  = await fetch('https://photoslibrary.googleapis.com/v1/albums', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({ album: { title: ALBUM_NAME + ' — ' + new Date().toLocaleDateString() } })
    });
    const data = await res.json();
    if (data.id) {
      gAlbumId  = data.id;
      gAlbumUrl = data.productUrl;
      console.log('Album created:', gAlbumUrl);
      generateAlbumQR(gAlbumUrl);
    }
  } catch(e) { console.error('Album creation failed:', e); }
}

async function uploadPhoto(dataURL) {
  if (!gSignedIn || !gAlbumId) return;
  try {
    // Step 1: Upload bytes to get upload token
    const blob      = await (await fetch(dataURL)).blob();
    const uploadRes = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
      method: 'POST',
      headers: {
        'Authorization':  `Bearer ${gAccessToken}`,
        'Content-Type':   'application/octet-stream',
        'X-Goog-Upload-Content-Type': 'image/jpeg',
        'X-Goog-Upload-Protocol':     'raw'
      },
      body: blob
    });
    const uploadToken = await uploadRes.text();

    // Step 2: Create media item in album
    const createRes = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({
        albumId: gAlbumId,
        newMediaItems: [{
          description: 'Photo Booth',
          simpleMediaItem: {
            fileName: `photobooth_${Date.now()}.jpg`,
            uploadToken
          }
        }]
      })
    });
    const createData = await createRes.json();
    console.log('Uploaded to Google Photos:', createData);
  } catch(e) { console.error('Google Photos upload failed:', e); }
}

// ── Face boxes ────────────────────────────────────────────────────────
function drawFaceBoxes(faces) {
  fctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
  if (!faces.length) return;
  const vw = faceCanvas.width, vh = faceCanvas.height;
  fctx.strokeStyle = busy ? 'rgba(232,160,32,0.7)' : 'rgba(76,200,130,0.75)';
  fctx.lineWidth = 2;
  const CL = 16;
  faces.forEach(f => {
    const b = f.boundingBox;
    const x = (b.originX ?? b.left ?? 0) * vw;
    const y = (b.originY ?? b.top  ?? 0) * vh;
    const w = (b.width   ?? 0.25) * vw;
    const h = (b.height  ?? 0.35) * vh;
    [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([cx,cy,dx,dy]) => {
      fctx.beginPath();
      fctx.moveTo(cx+dx*CL,cy); fctx.lineTo(cx,cy); fctx.lineTo(cx,cy+dy*CL);
      fctx.stroke();
    });
  });
}

// ── Peace sign ────────────────────────────────────────────────────────
function isPeaceSign(lm) {
  return fingerUp(lm,8,6,5) && fingerUp(lm,12,10,9)
      && !fingerUp(lm,16,14,13) && !fingerUp(lm,20,18,17);
}
function fingerUp(lm,tip,pip,mcp) {
  return lm[tip].y < lm[pip].y && lm[pip].y < lm[mcp].y + 0.03;
}

// ── Background canvas ─────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let animFrame2 = null;
let tick = 0;

function resizeBgCanvas() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  renderBg();
}
window.addEventListener('resize', resizeBgCanvas);

function renderBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  // Set body bg color directly — canvas draws patterns on top
  document.body.style.background = cfg.bgColor;

  // Clear canvas to transparent so body color shows through
  bgCtx.clearRect(0, 0, w, h);

  // Pattern drawn on top of body color
  const pat = PATTERNS.find(p => p.id === cfg.pattern);
  if (pat && pat.id !== 'none') pat.draw(bgCtx, w, h, cfg.bgColor, tick);
}

function startAnimation() {
  if (animFrame2) cancelAnimationFrame(animFrame2);
  const pat = PATTERNS.find(p => p.id === cfg.pattern);
  if (!pat || !pat.animated || !cfg.animate) { renderBg(); return; }

  function loop() {
    tick++;
    renderBg();
    animFrame2 = requestAnimationFrame(loop);
  }
  loop();
}

// ── Pattern draw functions ────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function darken(hex, amt=0.12) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${Math.max(0,r-r*amt)|0},${Math.max(0,g-g*amt)|0},${Math.max(0,b-b*amt)|0},0.35)`;
}
function complement(hex) {
  // Pick a contrasting accent color based on luminance
  const { r, g, b } = hexToRgb(hex);
  const lum = (r*299 + g*587 + b*114) / 1000;
  return lum > 128 ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.22)';
}

function drawNone() {}

function drawDots(ctx, w, h, bg) {
  const spacing = 38;
  const r = 5;
  ctx.fillStyle = complement(bg);
  const t = tick * 0.02;
  for (let x = spacing/2; x < w + spacing; x += spacing) {
    for (let y = spacing/2; y < h + spacing; y += spacing) {
      const pulse = 1 + Math.sin(t + (x + y) * 0.04) * 0.15;
      ctx.beginPath();
      ctx.arc(x, y, r * pulse, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawGingham(ctx, w, h, bg) {
  const size = 40;
  const accent = complement(bg);
  // Horizontal stripes
  for (let y = 0; y < h + size; y += size) {
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.25;
    ctx.fillRect(0, y, w, size/2);
  }
  // Vertical stripes
  for (let x = 0; x < w + size; x += size) {
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.25;
    ctx.fillRect(x, 0, size/2, h);
  }
  ctx.globalAlpha = 1;
}

function drawStars(ctx, w, h, bg) {
  const spacing = 55;
  const t = tick * 0.03;
  ctx.fillStyle = complement(bg);
  for (let xi = 0; xi < Math.ceil(w/spacing)+1; xi++) {
    for (let yi = 0; yi < Math.ceil(h/spacing)+1; yi++) {
      const x = xi * spacing + (yi % 2) * spacing/2;
      const y = yi * spacing;
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t + xi * 1.3 + yi * 0.9));
      ctx.globalAlpha = twinkle;
      drawStar(ctx, x, y, 5, 11, 5);
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(ctx, cx, cy, r, R, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const rad = i % 2 === 0 ? R : r;
    const x = cx + rad * Math.cos(angle);
    const y = cy + rad * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawChecker(ctx, w, h, bg) {
  const size = 48;
  // Use a solid computed color rather than rgba to avoid compositing glitches
  const { r, g, b } = hexToRgb(bg);
  const lum = (r*299 + g*587 + b*114) / 1000;
  // Shift lightness: dark bg gets lighter squares, light bg gets darker
  const shift = lum > 128 ? -28 : 28;
  const cr = Math.min(255, Math.max(0, r + shift));
  const cg = Math.min(255, Math.max(0, g + shift));
  const cb = Math.min(255, Math.max(0, b + shift));
  const accent = `rgb(${cr},${cg},${cb})`;
  ctx.clearRect(0, 0, w, h); // clear first to avoid accumulation
  for (let xi = 0; xi < Math.ceil(w/size)+1; xi++) {
    for (let yi = 0; yi < Math.ceil(h/size)+1; yi++) {
      if ((xi + yi) % 2 === 0) {
        ctx.fillStyle = accent;
        ctx.fillRect(xi*size, yi*size, size, size);
      }
    }
  }
}

function drawConfetti(ctx, w, h, bg) {
  const pieces = [
    { x:0.12, y:0, size:10, color:'#ff6b9d', rot:15  },
    { x:0.28, y:0, size:8,  color:'#a78bfa', rot:45  },
    { x:0.45, y:0, size:12, color:'#34d399', rot:72  },
    { x:0.61, y:0, size:9,  color:'#fbbf24', rot:30  },
    { x:0.77, y:0, size:11, color:'#60a5fa', rot:60  },
    { x:0.92, y:0, size:8,  color:'#f87171', rot:90  },
    { x:0.05, y:0, size:10, color:'#818cf8', rot:20  },
    { x:0.35, y:0, size:9,  color:'#fb923c', rot:55  },
    { x:0.55, y:0, size:7,  color:'#a3e635', rot:80  },
    { x:0.70, y:0, size:11, color:'#f472b6', rot:35  },
    { x:0.85, y:0, size:8,  color:'#38bdf8', rot:65  },
    { x:0.18, y:0, size:10, color:'#4ade80', rot:25  },
  ];
  const speed = 0.8;
  pieces.forEach((p, i) => {
    const yt = ((tick * speed + i * (h / pieces.length) * 1.5) % (h + 60)) - 30;
    ctx.save();
    ctx.translate(p.x * w, yt);
    ctx.rotate((p.rot + tick * 0.03 * (i % 2 === 0 ? 1 : -1)) * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.75;
    ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.6);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawLinen(ctx, w, h, bg) {
  // Subtle crosshatch texture
  const c = complement(bg);
  ctx.strokeStyle = c;
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.18;
  const spacing = 6;
  for (let x = 0; x < w; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
  }
  for (let y = 0; y < h; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawFloral(ctx, w, h, bg) {
  const spacing = 70;
  ctx.fillStyle = complement(bg);
  for (let xi = 0; xi < Math.ceil(w/spacing)+1; xi++) {
    for (let yi = 0; yi < Math.ceil(h/spacing)+1; yi++) {
      const x = xi * spacing + (yi % 2) * spacing * 0.5;
      const y = yi * spacing;
      drawFlower(ctx, x, y, 14);
    }
  }
}

function drawFlower(ctx, cx, cy, r) {
  const petals = 5;
  ctx.globalAlpha = 0.25;
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * Math.PI * 2;
    ctx.beginPath();
    ctx.ellipse(
      cx + Math.cos(angle) * r * 0.6,
      cy + Math.sin(angle) * r * 0.6,
      r * 0.5, r * 0.28, angle, 0, Math.PI * 2
    );
    ctx.fill();
  }
  // Center dot
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ── Settings panel ────────────────────────────────────────────────────
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function buildSettingsUI() {
  // Color preview
  const bgInput = document.getElementById('bg-color-input');
  const bgPreview = document.getElementById('bg-color-preview');
  bgInput.value = cfg.bgColor;
  bgPreview.style.background = cfg.bgColor;

  // Pattern grid
  const grid = document.getElementById('pattern-grid');
  grid.innerHTML = '';
  PATTERNS.forEach(p => {
    const thumb = document.createElement('div');
    thumb.className = 'pattern-thumb' + (cfg.pattern === p.id ? ' selected' : '');
    thumb.title = p.label;

    const c = document.createElement('canvas');
    c.width = 80; c.height = 80;
    const pctx = c.getContext('2d');
    pctx.fillStyle = cfg.bgColor;
    pctx.fillRect(0, 0, 80, 80);
    if (p.id !== 'none') p.draw(pctx, 80, 80, cfg.bgColor, 30);

    const lbl = document.createElement('div');
    lbl.className = 'p-label';
    lbl.textContent = p.label;

    thumb.appendChild(c);
    thumb.appendChild(lbl);
    thumb.onclick = () => {
      cfg.pattern = p.id;
      saveConfig();
      startAnimation();
      // Update selected state
      grid.querySelectorAll('.pattern-thumb').forEach(t => t.classList.remove('selected'));
      thumb.classList.add('selected');
    };
    grid.appendChild(thumb);
  });

  // Frame swatches
  const swatchWrap = document.getElementById('frame-swatches');
  swatchWrap.innerHTML = '';

  // Auto-complement swatch first
  const autoSw = document.createElement('div');
  autoSw.className = 'frame-swatch';
  autoSw.id = 'auto-frame-swatch';
  autoSw.style.position = 'relative';
  autoSw.style.overflow = 'hidden';
  // Draw "auto" label inside
  autoSw.innerHTML = '<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.38rem;letter-spacing:0.04em;text-transform:uppercase;font-family:DM Mono,monospace;opacity:0.6;pointer-events:none;">auto</span>';
  autoSw.onclick = () => {
    const color = autoSw.dataset.color || '#fdfaf4';
    cfg.frameColor = color;
    saveConfig();
    applyFrameColor();
    swatchWrap.querySelectorAll('.frame-swatch').forEach(s => s.classList.remove('selected'));
    autoSw.classList.add('selected');
  };
  swatchWrap.appendChild(autoSw);
  updateAutoSwatch();

  FRAME_COLORS.forEach(fc => {
    const sw = document.createElement('div');
    sw.className = 'frame-swatch' + (cfg.frameColor === fc.color ? ' selected' : '');
    sw.style.background = fc.color;
    sw.title = fc.label;
    if (fc.color === '#ffffff' || fc.color === '#fdfaf4') {
      sw.style.border = '2px solid rgba(0,0,0,0.12)';
    }
    sw.onclick = () => {
      cfg.frameColor = fc.color;
      saveConfig();
      applyFrameColor();
      swatchWrap.querySelectorAll('.frame-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    swatchWrap.appendChild(sw);
  });

  // Sync animation toggle
  const animBtn = document.getElementById('anim-toggle');
  if (animBtn) {
    animBtn.textContent = cfg.animate ? 'On' : 'Off';
    animBtn.style.background = cfg.animate ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.03)';
  }
  // Sync hex input
  const hexEl = document.getElementById('bg-hex-input');
  if (hexEl) hexEl.value = cfg.bgColor;
}

function onBgColor(val) {
  cfg.bgColor = val;
  document.getElementById('bg-color-preview').style.background = val;
  // Sync hex input
  const hexEl = document.getElementById('bg-hex-input');
  if (hexEl && document.activeElement !== hexEl) hexEl.value = val;
  saveConfig();
  buildSettingsUI();
  startAnimation();
  // Update auto-complement swatch
  updateAutoSwatch();
}

function onBgHex(val) {
  // Accept when valid 6-digit hex
  const cleaned = val.startsWith('#') ? val : '#' + val;
  if (/^#[0-9a-fA-F]{6}$/.test(cleaned)) {
    document.getElementById('bg-color-input').value = cleaned;
    onBgColor(cleaned);
  }
}

function toggleAnim() {
  cfg.animate = !cfg.animate;
  saveConfig();
  const btn = document.getElementById('anim-toggle');
  btn.textContent = cfg.animate ? 'On' : 'Off';
  btn.style.background = cfg.animate ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.03)';
  startAnimation();
}

function updateAutoSwatch() {
  // Auto-complement: pick frame color that contrasts bg
  const { r, g, b } = hexToRgb(cfg.bgColor);
  const lum = (r*299 + g*587 + b*114) / 1000;
  // Pick a warm neutral that complements the bg
  const autoColor = lum > 160
    ? '#1a1a1a'    // dark bg needed → black frame
    : lum > 80
    ? '#fdfaf4'    // mid tones → cream frame
    : '#f5f0e8';   // dark bg → off-white frame
  const autoSwatch = document.getElementById('auto-frame-swatch');
  if (autoSwatch) {
    autoSwatch.style.background = autoColor;
    autoSwatch.dataset.color    = autoColor;
    autoSwatch.title = 'Auto (' + (lum > 160 ? 'Black' : 'Cream') + ')';
  }
}

function applyFrameColor() {
  // Update all existing polaroids
  document.querySelectorAll('.booth-photo, .wall-photo').forEach(el => {
    el.style.background = cfg.frameColor;
    // Auto-pick label color based on frame brightness
    const { r, g, b } = hexToRgb(cfg.frameColor);
    const lum = (r*299 + g*587 + b*114) / 1000;
    const textColor = lum > 128 ? '#aaa' : 'rgba(255,255,255,0.5)';
    const label = el.querySelector('.photo-ts, .p-time');
    if (label) label.style.color = textColor;
  });
}

function applyTheme() {
  resizeBgCanvas();
  startAnimation();
  applyFrameColor();
}

// ── Key S to open settings ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 's' && !e.metaKey && !e.ctrlKey) toggleSettings();
});


window.initGoogleAuth  = initGoogleAuth;
window.toggleSettings  = toggleSettings;
window.toggleAnim      = toggleAnim;
window.onBgHex         = onBgHex;
window.buildSettingsUI = buildSettingsUI;
window.onBgColor       = onBgColor;
window.downloadAll     = downloadAll;
window.addEventListener('load', () => { buildSettingsUI(); applyTheme(); init(); });
</script>
