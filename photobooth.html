<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f0ece4;
  font-family: 'DM Mono', monospace;
}

/* ════════════════════════════════════════
   SHARED
════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
.screen.active {
  opacity: 1; pointer-events: all;
}

/* Pill label style used on both screens */
.pill-label {
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 100px;
  padding: 10px 22px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  white-space: nowrap;
}

/* ════════════════════════════════════════
   SCREEN 1: BOOTH
════════════════════════════════════════ */
#booth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f0ece4;
}

/* Polaroids scattered around - these are absolutely placed */
#booth-screen .scattered-photos {
  position: absolute; inset: 0;
  pointer-events: none;
}

/* Viewfinder: landscape, big */
#viewfinder-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#viewfinder {
  position: relative;
  width: 62vw;
  height: calc(62vw * 9 / 16);
  max-height: 70vh;
  max-width: calc(70vh * 16 / 9);
  background: #111;
  border-radius: 8px;
  overflow: visible; /* allow polaroids to overlap edges */
  box-shadow:
    0 0 0 2px #222,
    0 0 0 4px #333,
    0 28px 80px rgba(0,0,0,0.5);
}

/* Inner clip for video */
#vf-inner {
  position: absolute; inset: 0;
  border-radius: 8px;
  overflow: hidden;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
}

#face-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  transform: scaleX(-1);
}

#flash {
  position: absolute; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 20;
  transition: opacity 0.04s;
  border-radius: 8px;
}
#flash.on { opacity: 1; }

/* Corner brackets */
.vc {
  position: absolute;
  width: 22px; height: 22px;
  border-color: rgba(255,255,255,0.25);
  border-style: solid;
  pointer-events: none; z-index: 5;
}
.vc.tl { top:12px;    left:12px;   border-width:2px 0 0 2px; }
.vc.tr { top:12px;    right:12px;  border-width:2px 2px 0 0; }
.vc.bl { bottom:12px; left:12px;   border-width:0 0 2px 2px; }
.vc.br { bottom:12px; right:12px;  border-width:0 2px 2px 0; }

/* Countdown */
#countdown-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 15; pointer-events: none;
  background: rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.2s;
  border-radius: 8px;
}
#countdown-overlay.visible { opacity: 1; }

#countdown-num {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 22vw;
  color: #fff;
  line-height: 1;
  text-shadow: 0 8px 50px rgba(0,0,0,0.3);
}
#countdown-num.pop { animation: numPop 0.95s ease-out forwards; }
@keyframes numPop {
  0%   { transform: scale(1.5); opacity: 0; }
  20%  { transform: scale(1);   opacity: 1; }
  78%  { transform: scale(1);   opacity: 1; }
  100% { transform: scale(0.85); opacity: 0; }
}

/* Status pill above viewfinder */
#status-pill {
  position: absolute;
  top: -52px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

/* URL pill below viewfinder */
#url-pill {
  position: relative;
  z-index: 10;
}

/* Booth screen polaroids — scattered around the frame */
.booth-photo {
  position: absolute;
  background: #fdfaf4;
  padding: 8px 8px 26px;
  border-radius: 2px;
  box-shadow: 2px 4px 16px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.08);
  pointer-events: none;
  z-index: 20;
  transition: all 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.booth-photo img {
  display: block;
  object-fit: cover;
}

/* ════════════════════════════════════════
   SCREEN 2: PHOTO WALL
════════════════════════════════════════ */
#wall-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: #f0ece4;
}

#wall-title {
  position: absolute;
  top: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#wall-url {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

/* Three conveyor rows */
#conveyor-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0px;
  padding: 60px 0;
}

.conveyor-row {
  width: 100%;
  overflow: hidden;
  padding: 40px 0;
  position: relative;
  display: flex;
}

.conveyor-track {
  display: flex;
  gap: 24px;
  width: max-content;
  /* animation applied via JS per row */
}

@keyframes scrollLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Wall polaroids */
.wall-photo {
  flex-shrink: 0;
  background: #fdfaf4;
  padding: 8px 8px 28px;
  border-radius: 2px;
  box-shadow: 2px 4px 20px rgba(0,0,0,0.14), 0 1px 5px rgba(0,0,0,0.08);
}
.wall-photo img {
  display: block;
  width: 180px; height: 180px;
  object-fit: cover;
}

/* ── Sign-in overlay ── */
#signin-overlay {
  position: fixed; inset: 0;
  background: #141414;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 9998;
  text-align: center; padding: 30px;
}
#signin-overlay.done { display: none; }
#signin-title {
  font-size: 1.1rem; color: #ddd;
  letter-spacing: 0.2em; text-transform: uppercase;
}
#signin-sub {
  font-size: 0.65rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #555;
  line-height: 2; max-width: 280px;
}
#signin-btn {
  font-family: "DM Mono", monospace;
  font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase;
  background: #fff; color: #222;
  border: none; border-radius: 100px;
  padding: 12px 28px; cursor: pointer;
  transition: background 0.2s;
}
#signin-btn:hover { background: #e8e8e8; }

/* ── Boot overlay ── */
#boot-overlay {
  position: fixed; inset: 0;
  background: #141414;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 9999;
  text-align: center; padding: 30px;
}
#boot-overlay.done { display: none; }
#boot-title {
  font-size: 1.1rem; color: #ddd;
  letter-spacing: 0.2em; text-transform: uppercase;
}
#boot-msg {
  font-size: 0.65rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: #555;
  line-height: 2; max-width: 320px;
}
.spinner {
  width: 26px; height: 26px;
  border: 1.5px solid #2a2a2a;
  border-top-color: #e8a020;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HUD ── */
#hud {
  position: fixed; top: 16px; right: 18px;
  display: flex; align-items: center; gap: 10px;
  z-index: 1000;
}
#shot-counter {
  font-size: 0.55rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(0,0,0,0.18);
}
#dl-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(0,0,0,0.3);
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 100px; padding: 5px 12px;
  cursor: pointer; backdrop-filter: blur(8px);
  transition: all 0.2s; display: none;
}
#dl-btn:hover { background: rgba(255,255,255,0.9); color: rgba(0,0,0,0.55); }

/* Screen toggle hint */
#toggle-hint {
  position: fixed; bottom: 16px; left: 18px;
  font-size: 0.5rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(0,0,0,0.15);
  z-index: 1000;
}
</style>
</head>
<body>

<!-- ══ BOOTH SCREEN ══ -->
<div id="booth-screen" class="screen active">

  <!-- Polaroids scattered around camera (injected by JS) -->
  <div id="scattered-photos" class="scattered-photos"></div>

  <div id="viewfinder-wrap">
    <!-- Status pill floats above -->
    <div id="status-pill" class="pill-label">Starting…</div>

    <div id="viewfinder">
      <div id="vf-inner">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="face-canvas"></canvas>
      </div>
      <div id="flash"></div>
      <div class="vc tl"></div><div class="vc tr"></div>
      <div class="vc bl"></div><div class="vc br"></div>
      <div id="countdown-overlay"><div id="countdown-num">3</div></div>
    </div>

    <!-- URL pill below -->
    <div id="url-pill" class="pill-label">
      find your photos at <strong>bit.ly/your-link</strong>
    </div>
  </div>
</div>

<!-- ══ WALL SCREEN ══ -->
<div id="wall-screen" class="screen">
  <div id="wall-title" class="pill-label">the photo wall</div>

  <div id="conveyor-wrap">
    <div class="conveyor-row" id="row-0"><div class="conveyor-track" id="track-0"></div></div>
    <div class="conveyor-row" id="row-1"><div class="conveyor-track" id="track-1"></div></div>
    <div class="conveyor-row" id="row-2"><div class="conveyor-track" id="track-2"></div></div>
  </div>

  <div id="wall-url" class="pill-label" id="wall-bottom-pill">0 shots taken</div>
</div>

<!-- HUD -->
<div id="hud">
  <span id="shot-counter">0 shots</span>
  <button id="dl-btn" onclick="downloadAll()">⬇ download all</button>
</div>
<div id="toggle-hint">W — photo wall &nbsp;|&nbsp; B or ESC — booth</div>

<!-- Boot -->
<!-- Google Sign-in overlay -->
<div id="signin-overlay">
  <div id="signin-title">Photo Booth</div>
  <div id="signin-sub">Sign in with Google to save<br>your photos automatically</div>
  <button id="signin-btn" onclick="initGoogleAuth()">Sign in with Google</button>
</div>

<div id="boot-overlay">
  <div class="spinner"></div>
  <div id="boot-title">Photo Booth</div>
  <div id="boot-msg">Loading…</div>
</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
import { FaceDetector, HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs';

// ══ CONFIG ═══════════════════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '886639956777-nrr3flmoico29qvprt67h140ufvq0nnm.apps.googleusercontent.com';
const BITLY_LINK       = 'bit.ly/downloadmyphoto';
const ALBUM_NAME       = 'Photo Booth';
const MAX_PHOTOS       = 60;
// ════════════════════════════════════════════════════════════════════

const WASM_PATH  = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm';
const FACE_MODEL = 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite';
const HAND_MODEL = 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';

// ── DOM ───────────────────────────────────────────────────────────────
const video          = document.getElementById('video');
const faceCanvas     = document.getElementById('face-canvas');
const captureCanvas  = document.getElementById('capture-canvas');
const fctx           = faceCanvas.getContext('2d');
const flash          = document.getElementById('flash');
const statusPill     = document.getElementById('status-pill');
const countdownOvl   = document.getElementById('countdown-overlay');
const countdownNum   = document.getElementById('countdown-num');
const bootOverlay    = document.getElementById('boot-overlay');
const bootMsg        = document.getElementById('boot-msg');
const shotCounter    = document.getElementById('shot-counter');
const scatteredWrap  = document.getElementById('scattered-photos');
const wallUrl        = document.getElementById('wall-url');

// Set bit.ly link
document.getElementById('url-pill').innerHTML =
  `find your photos at <strong>${BITLY_LINK}</strong>`;
wallUrl.innerHTML = `0 shots taken`;

// ── State ─────────────────────────────────────────────────────────────
let faceDetector, handLandmarker;
let lastVideoTime = -1;
let lastFaces     = [];
let busy          = false;
let photoCount    = 0;
let allDataURLs   = [];
let currentScreen = 'booth'; // 'booth' | 'wall'

// Photo data store for wall
let photos = []; // { dataURL, rot }

// Conveyor tracks
const tracks    = [0,1,2].map(i => document.getElementById(`track-${i}`));
const rowPhotos = [[],[],[]]; // photos per row

// Row rotations: slight tilt per row, alternating direction
const ROW_ROTS = [
  [-8, -3, 2, -5, 4, -2, 6, -4, 1, -6],
  [4, -6, 2, 7, -3, 5, -1, 6, -5, 3],
  [-3, 5, -7, 2, -4, 7, -2, 4, -6, 3],
];

// ── Boot ──────────────────────────────────────────────────────────────
async function init() {
  try {
    bootMsg.textContent = 'Requesting camera…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();

    faceCanvas.width     = video.videoWidth;
    faceCanvas.height    = video.videoHeight;
    captureCanvas.width  = video.videoWidth;
    captureCanvas.height = video.videoHeight;

    bootMsg.innerHTML = 'Loading AI models…<br>First load ~15 sec';

    const vision = await FilesetResolver.forVisionTasks(WASM_PATH);
    [faceDetector, handLandmarker] = await Promise.all([
      FaceDetector.createFromOptions(vision, {
        baseOptions: { modelAssetPath: FACE_MODEL, delegate: 'GPU' },
        runningMode: 'VIDEO', minDetectionConfidence: 0.4
      }),
      HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: HAND_MODEL, delegate: 'GPU' },
        runningMode: 'VIDEO', numHands: 2,
        minHandDetectionConfidence: 0.55,
        minHandPresenceConfidence: 0.55,
        minTrackingConfidence: 0.5
      })
    ]);

    bootOverlay.classList.add('done');
    requestAnimationFrame(loop);
  } catch(e) {
    bootOverlay.querySelector('.spinner').style.display = 'none';
    bootMsg.innerHTML = e.name === 'NotAllowedError'
      ? 'Camera permission denied.<br>Allow access & refresh.'
      : 'Error: ' + e.message;
    console.error(e);
  }
}

// ── Detection loop ────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (!faceDetector || video.readyState < 2) return;
  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const fr = faceDetector.detectForVideo(video, ts);
  const hr = handLandmarker.detectForVideo(video, ts);
  lastFaces = fr.detections ?? [];

  if (currentScreen === 'booth') {
    drawFaceBoxes(lastFaces);
    if (!busy) processState(lastFaces, hr.landmarks ?? []);
  }
}

// ── State machine ─────────────────────────────────────────────────────
function processState(faces, hands) {
  if (!faces.length) { setStatus('Step into frame'); return; }
  if (hands.some(isPeaceSign)) { setStatus('get ready for the photo…'); startCountdown(); return; }
  setStatus('hold up a ✌️ sign to snap a photo');
}

function setStatus(t) { statusPill.textContent = t; }

// ── Countdown ─────────────────────────────────────────────────────────
function startCountdown() {
  busy = true;
  countdownOvl.classList.add('visible');
  let n = 3; showNum(n);
  const t = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(t);
      showNum('✦');
      setTimeout(() => { countdownOvl.classList.remove('visible'); doSnap(); }, 650);
    } else { showNum(n); }
  }, 1000);
}

function showNum(v) {
  countdownNum.textContent = v;
  countdownNum.classList.remove('pop');
  void countdownNum.offsetWidth;
  countdownNum.classList.add('pop');
}

// ── Snap ──────────────────────────────────────────────────────────────
function doSnap() {
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 110);

  const cctx = captureCanvas.getContext('2d');
  cctx.save();
  cctx.translate(captureCanvas.width, 0);
  cctx.scale(-1, 1);
  cctx.drawImage(video, 0, 0);
  cctx.restore();

  // Square center crop
  const vw = captureCanvas.width, vh = captureCanvas.height;
  const size = Math.min(vw, vh);
  const c = document.createElement('canvas');
  c.width = 800; c.height = 800;
  c.getContext('2d').drawImage(captureCanvas, (vw-size)/2, (vh-size)/2, size, size, 0, 0, 800, 800);
  const dataURL = c.toDataURL('image/jpeg', 0.93);

  addPhoto(dataURL);
  uploadPhoto(dataURL);

  setTimeout(() => {
    busy = false;
    setStatus('hold up a ✌️ sign to snap a photo');
  }, 2000);
}

// ── Add photo to both views ───────────────────────────────────────────
function addPhoto(dataURL) {
  photoCount++;
  allDataURLs.unshift(dataURL);

  const rot = (Math.random() - 0.5) * 16;
  photos.unshift({ dataURL, rot });
  if (photos.length > MAX_PHOTOS) photos.pop();

  // Update scattered photos on booth screen
  updateScattered();

  // Add to conveyor wall
  addToConveyor(dataURL, rot);

  // Update wall pill
  const mins = 0;
  wallUrl.innerHTML = `${photoCount} shot${photoCount !== 1 ? 's' : ''} taken — find yours at <strong>${BITLY_LINK}</strong>`;

  updateHUD();
}

// ── Booth scattered photos ────────────────────────────────────────────
// Positions around the viewfinder edges — truly random, not stacked
// Each photo gets a stable random position seeded by its index so it
// doesn't jump around every time a new photo is added.
function seededRand(seed) {
  // Simple deterministic random from seed
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

function updateScattered() {
  scatteredWrap.innerHTML = '';
  const vf = document.getElementById('viewfinder').getBoundingClientRect();
  const recent = photos.slice(0, 16);

  const SZ  = 140; // polaroid image size px
  const PW  = SZ + 18; // total polaroid width
  const PH  = SZ + 36; // total polaroid height
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const M   = 6; // hard margin — polaroid must be at least this far outside vf

  // Four strict strips around the viewfinder.
  // A polaroid placed in a strip can NEVER overlap the vf rect.
  //
  //   LEFT strip:   right edge of polaroid  <= vf.left - M
  //   RIGHT strip:  left edge of polaroid   >= vf.right + M
  //   TOP strip:    bottom edge of polaroid <= vf.top - M   (only between left/right strips)
  //   BOTTOM strip: top edge of polaroid    >= vf.bottom + M
  //
  // For LEFT/RIGHT: x is fully constrained so the polaroid sits just outside.
  // y is random across the full screen height (polaroids can be above/below vf vertically).
  // For TOP/BOTTOM: y is constrained. x is random but must also stay outside left/right bounds.

  // Left strip — polaroid right edge touches vf.left
  const leftX  = { min: Math.max(4,       vf.left - PW - 40), max: vf.left - M - PW };
  // Right strip — polaroid left edge touches vf.right
  const rightX = { min: vf.right + M,     max: Math.min(W - PW - 4, vf.right + 60) };
  // Full vertical range (allow polaroids to sit level with or beyond vf vertically)
  const fullY  = { min: Math.max(4, vf.top - PH * 0.4), max: Math.min(H - PH - 4, vf.bottom + PH * 0.4) };

  // Top strip — only outside the left/right strips horizontally
  const topY   = { min: Math.max(4, vf.top - PH - 20), max: vf.top - M - PH };
  const botY   = { min: vf.bottom + M,                  max: Math.min(H - PH - 4, vf.bottom + PH + 20) };
  // x for top/bottom: anywhere across screen
  const horzX  = { min: Math.max(4, vf.left - PW * 0.5), max: Math.min(W - PW - 4, vf.right - PW * 0.5) };

  const zones = [
    { x: leftX,  y: fullY },  // 0 left
    { x: rightX, y: fullY },  // 1 right
    { x: leftX,  y: { min: fullY.min, max: fullY.min + (fullY.max - fullY.min) * 0.5 } }, // 2 left-upper
    { x: rightX, y: { min: fullY.min + (fullY.max - fullY.min) * 0.5, max: fullY.max } }, // 3 right-lower
    { x: leftX,  y: { min: fullY.min + (fullY.max - fullY.min) * 0.5, max: fullY.max } }, // 4 left-lower
    { x: rightX, y: { min: fullY.min, max: fullY.min + (fullY.max - fullY.min) * 0.5 } }, // 5 right-upper
    { x: horzX,  y: topY  },  // 6 top
    { x: horzX,  y: botY  },  // 7 bottom
  ];

  recent.forEach((p, i) => {
    const zone = zones[i % zones.length];
    const r1   = seededRand(i * 7 + 1);
    const r2   = seededRand(i * 7 + 2);

    const xRange = Math.max(1, zone.x.max - zone.x.min);
    const yRange = Math.max(1, zone.y.max - zone.y.min);
    const x = zone.x.min + r1 * xRange;
    const y = zone.y.min + r2 * yRange;

    const el = document.createElement('div');
    el.className = 'booth-photo';
    el.style.cssText = `
      left: ${x}px;
      top:  ${y}px;
      transform: rotate(${p.rot}deg);
      animation: boothPhotoIn 0.45s cubic-bezier(0.34,1.5,0.64,1) both;
      animation-delay: ${i * 0.04}s;
    `;

    const img = document.createElement('img');
    img.src = p.dataURL;
    img.style.cssText = `width:${SZ}px;height:${SZ}px;object-fit:cover;display:block;`;

    el.appendChild(img);
    scatteredWrap.appendChild(el);
  });
}

// ── Conveyor wall ─────────────────────────────────────────────────────
function addToConveyor(dataURL, rot) {
  const rowIdx = (photoCount - 1) % 3; // distribute across 3 rows
  rowPhotos[rowIdx].push({ dataURL, rot });
  rebuildConveyor(rowIdx);
}

function rebuildConveyor(rowIdx) {
  const track  = tracks[rowIdx];
  const photos = rowPhotos[rowIdx];
  const screenW = window.innerWidth;

  // Clear and rebuild from source of truth (rowPhotos)
  track.innerHTML = '';
  track.style.animation = 'none';

  if (photos.length === 0) return;

  // Build one set of real photos first
  function makeCard(p, idx) {
    const el  = document.createElement('div');
    el.className = 'wall-photo';
    // Random vertical offset per card so they look scattered, not grid-like
    const dy = (seededRand(idx * 13 + rowIdx * 77) - 0.5) * 60;
    el.style.transform = `rotate(${p.rot}deg) translateY(${dy}px)`;
    const img = document.createElement('img');
    img.src = p.dataURL;
    el.appendChild(img);
    return el;
  }

  photos.forEach((p, i) => track.appendChild(makeCard(p, i)));

  // Only scroll if content is wider than the screen
  // Use setTimeout to let browser calculate scrollWidth
  setTimeout(() => {
    const trackW = track.scrollWidth;
    if (trackW <= screenW) {
      // Not enough photos to scroll — just center them, no animation
      track.parentElement.style.justifyContent = 'center';
      return;
    }
    track.parentElement.style.justifyContent = '';

    // Duplicate cards to make seamless loop
    const clone = track.cloneNode(true);
    clone.querySelectorAll('img').forEach((img, i) => {
      img.src = photos[i % photos.length].dataURL;
    });
    // Actually just append individual clones
    photos.forEach((p, i) => track.appendChild(makeCard(p, i + photos.length)));

    const totalW = track.scrollWidth / 2;
    const speed  = 38; // px/s
    const dur    = totalW / speed;

    void track.offsetWidth;
    track.style.animation = `scrollLeft ${dur}s linear infinite`;
  }, 60);
}

// ── Google Photos auth + upload ───────────────────────────────────────
let gAccessToken  = null;
let gAlbumId      = null;
let gAlbumUrl     = null;
let gSignedIn     = false;

function initGoogleAuth() {
  google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/photoslibrary.appendonly https://www.googleapis.com/auth/photoslibrary.readonly.appcreateddata',
    callback: async (resp) => {
      if (resp.error) { console.error('Auth error:', resp); return; }
      gAccessToken = resp.access_token;
      gSignedIn    = true;
      document.getElementById('signin-overlay').classList.add('done');
      // Create or find the album
      await ensureAlbum();
    }
  }).requestAccessToken();
}

async function ensureAlbum() {
  try {
    // Create a new album for this session
    const res  = await fetch('https://photoslibrary.googleapis.com/v1/albums', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({ album: { title: ALBUM_NAME + ' — ' + new Date().toLocaleDateString() } })
    });
    const data = await res.json();
    if (data.id) {
      gAlbumId  = data.id;
      gAlbumUrl = data.productUrl;
      console.log('Album created:', gAlbumUrl);
      // Update bit.ly pill with real album link
      const shortUrl = gAlbumUrl;
      document.getElementById('url-pill').innerHTML =
        `find your photos at <strong>${BITLY_LINK}</strong>`;
      wallUrl.innerHTML =
        `${photoCount} shot${photoCount !== 1 ? 's' : ''} taken — find yours at <strong>${BITLY_LINK}</strong>`;
    }
  } catch(e) { console.error('Album creation failed:', e); }
}

async function uploadPhoto(dataURL) {
  if (!gSignedIn || !gAlbumId) return;
  try {
    // Step 1: Upload bytes to get upload token
    const blob      = await (await fetch(dataURL)).blob();
    const uploadRes = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
      method: 'POST',
      headers: {
        'Authorization':  `Bearer ${gAccessToken}`,
        'Content-Type':   'application/octet-stream',
        'X-Goog-Upload-Content-Type': 'image/jpeg',
        'X-Goog-Upload-Protocol':     'raw'
      },
      body: blob
    });
    const uploadToken = await uploadRes.text();

    // Step 2: Create media item in album
    const createRes = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({
        albumId: gAlbumId,
        newMediaItems: [{
          description: 'Photo Booth',
          simpleMediaItem: {
            fileName: `photobooth_${Date.now()}.jpg`,
            uploadToken
          }
        }]
      })
    });
    const createData = await createRes.json();
    console.log('Uploaded to Google Photos:', createData);
  } catch(e) { console.error('Google Photos upload failed:', e); }
}

// ── Screen switching ──────────────────────────────────────────────────
function switchTo(screen) {
  currentScreen = screen;
  document.getElementById('booth-screen').classList.toggle('active', screen === 'booth');
  document.getElementById('wall-screen').classList.toggle('active', screen === 'wall');
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'w') switchTo('wall');
  if (k === 'b' || k === 'escape') switchTo('booth');
});

// ── Face boxes ────────────────────────────────────────────────────────
function drawFaceBoxes(faces) {
  fctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
  if (!faces.length) return;
  const vw = faceCanvas.width, vh = faceCanvas.height;
  fctx.strokeStyle = busy ? 'rgba(232,160,32,0.7)' : 'rgba(76,200,130,0.75)';
  fctx.lineWidth = 2;
  const CL = 16;
  faces.forEach(f => {
    const b = f.boundingBox;
    const x = (b.originX ?? b.left ?? 0) * vw;
    const y = (b.originY ?? b.top  ?? 0) * vh;
    const w = (b.width   ?? 0.25) * vw;
    const h = (b.height  ?? 0.35) * vh;
    [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([cx,cy,dx,dy]) => {
      fctx.beginPath();
      fctx.moveTo(cx+dx*CL,cy); fctx.lineTo(cx,cy); fctx.lineTo(cx,cy+dy*CL);
      fctx.stroke();
    });
  });
}

// ── Peace sign ────────────────────────────────────────────────────────
function isPeaceSign(lm) {
  return fingerUp(lm,8,6,5) && fingerUp(lm,12,10,9)
      && !fingerUp(lm,16,14,13) && !fingerUp(lm,20,18,17);
}
function fingerUp(lm,tip,pip,mcp) {
  return lm[tip].y < lm[pip].y && lm[pip].y < lm[mcp].y + 0.03;
}

// ── Download all ──────────────────────────────────────────────────────
async function downloadAll() {
  for (let i = 0; i < allDataURLs.length; i++) {
    const a = document.createElement('a');
    a.href = allDataURLs[i];
    a.download = `photobooth_${String(i+1).padStart(2,'0')}.jpg`;
    a.click();
    await new Promise(r => setTimeout(r, 250));
  }
}
window.downloadAll = downloadAll;

function updateHUD() {
  shotCounter.textContent = photoCount + (photoCount === 1 ? ' shot' : ' shots');
  document.getElementById('dl-btn').style.display = photoCount > 0 ? 'block' : 'none';
}
